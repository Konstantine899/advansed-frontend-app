"name: CI/CD Pipeline - Linting, Testing, Building\n\non:\n  push:\n    branches: [master]\n  pull_request:\n    branches: [master]\n\npermissions:\n  contents: read\n  pages: write\n  id-token: write\n\nconcurrency:\n  group: ci-${{ github.ref }}\n  cancel-in-progress: true\n\njobs:\n  lint-and-test:\n    name: Lint and Test\n    runs-on: ubuntu-latest\n    \n    steps:\n    - name: 🚀 Checkout code\n      uses: actions/checkout@v4\n    \n    - name: ⎔ Setup Node.js 18\n      uses: actions/setup-node@v4\n      with:\n        node-version: '18'\n        cache: 'npm'\n    \n    - name: 📦 Cache dependencies\n      uses: actions/cache@v3\n      with:\n        path: node_modules\n        key: \${{ runner.os }}-node-\${{ hashFiles('package-lock.json') }}\n    \n    - name: 📥 Install dependencies\n      run: npm ci\n    \n    - name: 🔍 Lint TypeScript\n      run: npm run lint:ts\n    \n    - name: 🎨 Lint SCSS\n      run: npm run lint:scss\n    \n    - name: ⚡ Unit Testing\n      run: npm run test:unit\n    \n    - name: 📊 Test Summary\n      run: |\n        echo \"✅ Linting and testing completed\"\n        echo \"🕒 Time: $(date)\"\n\n  build-and-deploy:\n    name: Build and Deploy\n    runs-on: ubuntu-latest\n    needs: lint-and-test\n    environment:\n      name: github-pages\n      url: \${{ steps.deployment.outputs.page_url }}\n    \n    steps:\n    - name: 🚀 Checkout code\n      uses: actions/checkout@v4\n    \n    - name: ⎔ Setup Node.js 18\n      uses: actions/setup-node@v4\n      with:\n        node-version: '18'\n        cache: 'npm'\n    \n    - name: 📦 Cache dependencies\n      uses: actions/cache@v3\n      with:\n        path: node_modules\n        key: \${{ runner.os }}-node-\${{ hashFiles('package-lock.json') }}\n    \n    - name: 📥 Install dependencies\n      run: npm ci\n    \n    - name: 🏗️ Build Production (Webpack)\n      run: npm run build:prod\n    \n    - name: ⚡ Build Vite\n      run: npm run build:vite\n    \n    - name: 📚 Build Storybook\n      run: npm run storybook:build\n    \n    - name: 🖼️ Visual Testing\n      run: npm run test:ui:ci\n    \n    - name: 📈 Generate Test Report\n      run: npm run test:ui:report\n    \n    - name: 📁 Prepare Reports\n      run: mkdir -p reports && mv .loki reports/ 2>/dev/null || true\n    \n    - name: ⚙️ Setup Pages\n      uses: actions/configure-pages@v4\n    \n    - name: 📤 Upload Artifact\n      uses: actions/upload-pages-artifact@v3\n      with:\n        path: './dist'\n    \n    - name: 🚀 Deploy to GitHub Pages\n      id: deployment\n      uses: actions/deploy-pages@v4\n    \n    - name: 📊 Deployment Summary\n      run: |\n        echo \"🎉 Deployment successful!\"\n        echo \"🌐 Site URL: \${{ steps.deployment.outputs.page_url }}\"\n        echo \"🕒 Time: $(date)\"\n\n  e2e-test:\n    name: E2E Testing\n    runs-on: ubuntu-latest\n    needs: build-and-deploy\n    \n    steps:\n    - name: 🚀 Checkout code\n      uses: actions/checkout@v4\n    \n    - name: ⎔ Setup Node.js 18\n      uses: actions/setup-node@v4\n      with:\n        node-version: '18'\n        cache: 'npm'\n    \n    - name: 📥 Install dependencies\n      run: npm ci\n    \n    - name: 🌐 E2E Testing\n      run: npm run test:e2e -- --headless\n      continue-on-error: true\n\n  notify:\n    name: Notify Status\n    runs-on: ubuntu-latest\n    needs: [lint-and-test, build-and-deploy, e2e-test]\n    if: always()\n    \n    steps:\n    - name: 📢 Workflow Summary\n      run: |\n        echo \"📊 CI/CD PIPELINE SUMMARY\"\n        echo \"=========================\"\n        echo \"Repository: \${{ github.repository }}\"\n        echo \"Ref: \${{ github.ref }}\"\n        echo \"SHA: \${{ github.sha }}\"\n        echo \"\"\n        \n        if [[ \"\${{ needs.lint-and-test.result }}\" == \"success\" && \"\${{ needs.build-and-deploy.result }}\" == \"success\" ]]; then\n          echo \"✅ STATUS: ALL CHECKS PASSED\"\n          echo \"🌐 Site: \${{ needs.build-and-deploy.outputs.page_url }}\"\n        elif [[ \"\${{ needs.lint-and-test.result }}\" == \"failure\" ]]; then\n          echo \"❌ STATUS: LINT/TEST FAILED\"\n          echo \"💡 Check linting and test logs\"\n        elif [[ \"\${{ needs.build-and-deploy.result }}\" == \"failure\" ]]; then\n          echo \"❌ STATUS: BUILD/DEPLOY FAILED\"\n          echo \"💡 Check build and deploy logs\"\n        else\n          echo \"⚠️ STATUS: PARTIAL SUCCESS\"\n        fi\n        \n        echo \"\"\n        echo \"⏰ Completed at: $(date)\""