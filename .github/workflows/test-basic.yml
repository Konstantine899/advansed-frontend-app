name: Basic Test Workflow

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check if workflow runs
      run: |
        echo "🎉 Workflow is running!"
        echo "Repository: ${{ github.repository }}"
        echo "Event: ${{ github.event_name }}"
        echo "SHA: ${{ github.sha }}"
        echo "This proves GitHub Actions is enabled."
